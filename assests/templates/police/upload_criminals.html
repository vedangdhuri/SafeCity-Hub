{% extends 'base.html' %}
{% load static %}

{% block navbar %}
<a href="{% url 'police_home' %}"
  class="text-sm font-medium text-gray-400 hover:text-white transition duration-200">Settings</a>
<a href="{% url 'view_complaints' %}"
  class="text-sm font-medium text-gray-400 hover:text-white transition duration-200">View Complaints</a>
<a href="{% url 'upload_criminals' %}"
  class="text-sm font-medium text-white border-b-2 border-blue-500 pb-1 hover:text-blue-400 transition duration-200">Upload
  Criminal</a>
<a href="{% url 'crime_analysis' %}"
  class="text-sm font-medium text-gray-400 hover:text-white transition duration-200">Analysis</a>
<a href="{% url 'crime_chart' %}"
  class="text-sm font-medium text-gray-400 hover:text-white transition duration-200">Charts</a>
<a href="{% url 'police_login' %}"
  class="text-sm font-medium text-red-400 hover:text-red-300 transition duration-200 ml-4">Logout</a>
{% endblock %}

{% block content %}
<div class="w-full max-w-4xl mx-auto relative mt-8">
  <div class="absolute -inset-1 bg-gradient-to-r from-red-600 to-red-800 rounded-2xl blur opacity-25"></div>

  <div class="glass relative p-8 rounded-2xl">
    <div class="text-center mb-8 border-b border-gray-800 pb-6">
      <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Register Criminal Record</h2>
      <p class="text-sm text-gray-400">Log an arrested or convicted individual into the central database.</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-6">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
        <!-- Administrative Info -->
        <div class="space-y-6">
          <div>
            <label for="station_name" class="block text-sm font-medium text-gray-300 mb-1">Station Name</label>
            <input type="text" name="station_name" id="station_name" value="{{sname}}" readonly
              class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-gray-400 cursor-not-allowed">
          </div>

          <div>
            <label for="arae_code" class="block text-sm font-medium text-gray-300 mb-1">Area Code</label>
            <input type="text" name="arae_code" id="arae_code" value="{{area_code}}" readonly
              class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-gray-400 cursor-not-allowed">
          </div>

          <div>
            <label for="city" class="block text-sm font-medium text-gray-300 mb-1">City</label>
            <input type="text" name="city" id="city" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
              placeholder="City of arrest">
          </div>

          <div>
            <label for="criminal_name" class="block text-sm font-medium text-gray-300 mb-1">Criminal Name</label>
            <input type="text" name="criminal_name" id="criminal_name" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
              placeholder="Full name">
          </div>

          <div>
            <label for="mobile" class="block text-sm font-medium text-gray-300 mb-1">Phone</label>
            <input type="text" name="mobile" id="mobile" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
              placeholder="Known phone number">
          </div>
        </div>

        <!-- Case details -->
        <div class="space-y-6">
          <div>
            <label for="complaint_type" class="block text-sm font-medium text-gray-300 mb-1">Complaint / Crime
              Type</label>
            <input type="text" name="complaint_type" id="complaint_type" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
              placeholder="Type of Crime">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="acts" class="block text-sm font-medium text-gray-300 mb-1">Acts Violated</label>
              <input type="text" name="acts" id="acts" required
                class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                placeholder="Legal acts">
            </div>
            <div>
              <label for="sessions" class="block text-sm font-medium text-gray-300 mb-1">Sessions Court</label>
              <input type="text" name="sessions" id="sessions" required
                class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                placeholder="Session #">
            </div>
          </div>

          <div>
            <label for="year" class="block text-sm font-medium text-gray-300 mb-1">Year</label>
            <input type="text" name="year" id="year" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
              placeholder="YYYY">
          </div>

          <div>
            <label for="status" class="block text-sm font-medium text-gray-300 mb-1">Current Status</label>
            <select name="status" id="status" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition">
              <option value="Remanded">Remanded</option>
              <option value="Convicted">Convicted</option>
              <option value="Absconding">Absconding</option>
              <option value="Bailed">Bailed out</option>
            </select>
          </div>

          <div>
            <label for="criminal_image" class="block text-sm font-medium text-gray-300 mb-1">Criminal Booking
              Photo</label>
            <input type="file" name="criminal_image" id="criminal_image" required accept="image/*"
              class="w-full px-4 py-2.5 bg-gray-900/50 border border-gray-700/50 rounded-xl text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-red-500/20 file:text-red-400 hover:file:bg-red-500/30 transition">
          </div>
        </div>
      </div>

      <div class="pt-6 border-t border-gray-800/80">
        <button type="submit"
          class="w-full md:w-auto md:px-12 py-3 bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white rounded-xl font-semibold shadow-lg shadow-red-500/30 transition duration-200 transform hover:-translate-y-0.5 mx-auto block">
          Upload Record to Central Database
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
