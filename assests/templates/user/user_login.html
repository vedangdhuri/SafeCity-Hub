{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="w-full max-w-md mx-auto relative mt-16">
  <!-- Glow effect behind box -->
  <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl blur opacity-25"></div>

  <div class="glass relative p-8 rounded-2xl">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Citizen Login</h2>
      <p class="text-sm text-gray-400">Sign in to report and track complaints.</p>
    </div>

    {% if messages %}
    <div class="mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500/50 text-red-200 text-sm text-center">
      {% for message in messages %}
      {{ message }}
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'user_login' %}" class="space-y-6">
      {% csrf_token %}
      <div>
        <label for="userid" class="block text-sm font-medium text-gray-300 mb-1">User ID or Email Address</label>
        <input type="text" name="userid" id="userid" required
          class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          placeholder="johndoe123 or john@example.com">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
        <div class="relative">
          <input type="password" name="password" id="password" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition pr-12"
            placeholder="••••••••">
          <button type="button" onclick="togglePassword('password')"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-white focus:outline-none">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between mt-2">
        <a href="{% url 'forgot_password' %}"
          class="text-sm text-blue-400 hover:text-blue-300 transition duration-200">Forgot password?</a>
      </div>

      <button type="submit"
        class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/30 transition duration-200 transform hover:-translate-y-0.5 mt-4">
        Sign In
      </button>

      <p class="text-center text-gray-400 text-sm mt-8">
        Don't have an account?
        <a href="{% url 'user_register' %}"
          class="text-blue-400 hover:text-blue-300 font-medium transition duration-200">Register
          now</a>
      </p>
    </form>
  </div>
</div>

<script>
  function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
      input.type = "text";
    } else {
      input.type = "password";
    }
  }
</script>
{% endblock %}
