{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="w-full max-w-md mx-auto relative mt-16">
    <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl blur opacity-25"></div>

    <div class="glass relative p-8 rounded-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Reset Password</h2>
            <p class="text-sm text-gray-400">Enter your User ID or Registered Email to receive an OTP.</p>
        </div>

        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div
                class="p-3 rounded-lg text-sm text-center font-medium {% if message.tags == 'error' %}bg-red-500/20 border border-red-500/50 text-red-200{% else %}bg-green-500/20 border border-green-500/50 text-green-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'forgot_password' %}" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="userid" class="block text-sm font-medium text-gray-300 mb-1">User ID or Email
                    Address</label>
                <input type="text" name="userid" id="userid" required
                    class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="johndoe123 or john@example.com">
            </div>

            <button type="submit"
                class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/30 transition duration-200 transform hover:-translate-y-0.5 mt-8">
                Send OTP
            </button>

            <div class="mt-8 pt-4 border-t border-gray-800 text-center">
                <a href="{% url 'user_login' %}"
                    class="text-sm text-gray-400 hover:text-white transition duration-200 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }
</script>
{% endblock %}
