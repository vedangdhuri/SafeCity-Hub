{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="w-full max-w-2xl mx-auto relative mt-8">
  <div class="absolute -inset-1 bg-gradient-to-r from-purple-600 to-blue-600 rounded-2xl blur opacity-25"></div>

  <div class="glass relative p-8 rounded-2xl">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Create Citizen Account</h2>
      <p class="text-sm text-gray-400">Join the platform to access reporting features.</p>
    </div>

    <form method="post" action="{% url 'user_register' %}" class="space-y-6">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Group 1 -->
        <div>
          <label for="fullname" class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
          <input type="text" name="fullname" id="fullname" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            placeholder="John Doe">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
          <input type="email" name="email" id="email" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            placeholder="john@example.com">
        </div>

        <div>
          <label for="mobile" class="block text-sm font-medium text-gray-300 mb-1">Mobile Number</label>
          <input type="text" name="mobile" id="mobile" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            placeholder="10-digit number">
        </div>

        <div>
          <label for="gender" class="block text-sm font-medium text-gray-300 mb-1">Gender</label>
          <select name="gender" id="gender" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
            <option value="" disabled selected>Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <label for="location" class="block text-sm font-medium text-gray-300 mb-1">Location / Address</label>
          <input type="text" name="location" id="location" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            placeholder="Your residential location">
        </div>

        <div class="col-span-1 md:col-span-2 border-t border-gray-800/80 my-2 py-2"></div>

        <!-- Credentials Section additions to avoid email generated passwords -->
        <div>
          <label for="userid" class="block text-sm font-medium text-gray-300 mb-1">Choose User ID</label>
          <input type="text" name="userid" id="userid" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            placeholder="johndoe123">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition pr-12"
              placeholder="••••••••">
            <button type="button" onclick="togglePassword('password')"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-white focus:outline-none">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

      </div>

      <div class="pt-4">
        <button type="submit"
          class="w-full py-3 px-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white rounded-xl font-semibold shadow-lg shadow-purple-500/30 transition duration-200 transform hover:-translate-y-0.5">
          Register Account
        </button>
      </div>
    </form>

    <p class="mt-6 text-center text-sm text-gray-400">
      Already have an account?
      <a href="{% url 'user_login' %}" class="text-purple-400 hover:text-purple-300 font-medium transition">Sign in
        here</a>
    </p>
  </div>
</div>

<script>
  function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
      input.type = "text";
    } else {
      input.type = "password";
    }
  }
</script>
{% endblock %}
