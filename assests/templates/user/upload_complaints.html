{% extends 'base.html' %}
{% load static %}

{% block navbar %}
<a href="{% url 'upload_complaints' %}"
  class="text-sm font-medium text-white hover:text-blue-400 transition duration-200 border-b-2 border-blue-500 pb-1">Upload
  Complaints</a>
<a href="{% url 'change_details' %}"
  class="text-sm font-medium text-gray-400 hover:text-white transition duration-200">Settings</a>
<a href="{% url 'user_login' %}"
  class="text-sm font-medium text-red-400 hover:text-red-300 transition duration-200 ml-4">Logout</a>
{% endblock %}

{% block content %}
<div class="w-full max-w-4xl mx-auto relative mt-8">
  <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl blur opacity-25"></div>

  <div class="glass relative p-8 rounded-2xl">
    <div class="text-center mb-8 border-b border-gray-800 pb-6">
      <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Lodge a New Complaint</h2>
      <p class="text-sm text-gray-400">Fill out the details carefully. Your identity and information remain secure.</p>
    </div>

    <form method="post" action="{% url 'upload_complaints' %}" class="space-y-6">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
        <!-- User Information -->
        <div class="space-y-6">
          <div>
            <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
            <input type="text" name="name" id="name" value="{{username}}" readonly
              class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-gray-400 cursor-not-allowed">
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Registered Email</label>
            <input type="text" name="email" id="email" value="{{email}}" readonly
              class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-gray-400 cursor-not-allowed">
          </div>

          <div>
            <label for="mobile" class="block text-sm font-medium text-gray-300 mb-1">Mobile Number</label>
            <input type="text" name="mobile" id="mobile" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="Enter 10-digit number">
          </div>

          <div>
            <label for="date" class="block text-sm font-medium text-gray-300 mb-1">Incident Date (YYYY-MM-DD)</label>
            <input type="date" name="date" id="date" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              style="color-scheme: dark;">
          </div>
        </div>

        <!-- Location Details -->
        <div class="space-y-6">
          <div>
            <label for="address" class="block text-sm font-medium text-gray-300 mb-1">Incident Address</label>
            <input type="text" name="address" id="address" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="Street / Area">
          </div>

          <div>
            <label for="city" class="block text-sm font-medium text-gray-300 mb-1">City</label>
            <input type="text" name="city" id="city" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="Your City">
          </div>

          <div>
            <label for="area_code" class="block text-sm font-medium text-gray-300 mb-1">Area Code (ZIP / Postal)</label>
            <input type="text" name="area_code" id="area_code" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="Area / Postal Code">
          </div>

          <div>
            <label for="complaint_type" class="block text-sm font-medium text-gray-300 mb-1">Complaint Type</label>
            <select name="complaint_type" id="complaint_type" required
              class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition appearance-none">
              <option value="" disabled selected>Select an option</option>
              <option value="Theft">Theft / Robbery</option>
              <option value="Assault">Assault</option>
              <option value="Fraud">Fraud / Cybercrime</option>
              <option value="Missing Person">Missing Person</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="col-span-1 md:col-span-2 mt-4 space-y-2">
          <label for="complaint" class="block text-sm font-medium text-gray-300 mb-1">Complaint Description</label>
          <textarea name="complaint" id="complaint" rows="6" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="Provide detailed information regarding the incident..."></textarea>
        </div>
      </div>

      <div class="pt-6 border-t border-gray-800/80">
        <button type="submit"
          class="w-full md:w-auto md:px-12 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/30 transition duration-200 transform hover:-translate-y-0.5 mx-auto block">
          Submit Report Securely
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
