{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="w-full max-w-md mx-auto relative mt-16">
  <div class="absolute -inset-1 bg-gradient-to-r from-red-600 to-orange-600 rounded-2xl blur opacity-25"></div>

  <div class="glass relative p-8 rounded-2xl">
    <div class="flex justify-center mb-6">
      <div class="h-16 w-16 bg-red-500/20 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
          </path>
        </svg>
      </div>
    </div>

    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white tracking-tight mb-2">System Administrator</h2>
      <p class="text-sm text-gray-400">HQ Higher Officer Access Only</p>
    </div>

    <form method="post" action="{% url 'admin_login' %}" class="space-y-6">
      {% csrf_token %}
      <div>
        <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Admin Username or Email</label>
        <input type="text" name="username" id="username" required
          class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
          placeholder="Admin ID or admin@crime.gov">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Admin Password</label>
        <div class="relative">
          <input type="password" name="password" id="password" required
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition pr-12"
            placeholder="••••••••">
          <button type="button" onclick="togglePassword('password')"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-white focus:outline-none">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
        class="w-full py-3 px-4 bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white rounded-xl font-semibold shadow-lg shadow-red-500/30 transition duration-200 transform hover:-translate-y-0.5 mt-8">
        Verify Credentials
      </button>

      <div class="mt-8 pt-6 border-t border-gray-800/80 text-center">
        <p class="text-xs text-gray-500">
          This system is restricted to High Command personnel. Access logs are continually audited.
        </p>
      </div>
    </form>
  </div>
</div>

<script>
  function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
      input.type = "text";
    } else {
      input.type = "password";
    }
  }
</script>
{% endblock %}
